services:
  gamepedia:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      # Connects to the SAME Postgres instance as Nexus.
      # DB_PASSWORD must match the value in /opt/nexus/.env
      DATABASE_URL: "ecto://nexus:${DB_PASSWORD}@nexus-db-1/nexus_prod"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PORT: "4001"
      MIX_ENV: prod
    ports:
      - "4001:4001"
    networks:
      - nexus_default

networks:
  nexus_default:
    external: true
