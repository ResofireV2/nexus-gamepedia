services:
  gamepedia:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      # Uses the same Postgres instance as Nexus but its own database.
      # DB_PASSWORD must match the value in /opt/nexus/.env
      DATABASE_URL: "ecto://nexus:${DB_PASSWORD}@nexus-db-1/gamepedia_prod"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PORT: "4001"
      MIX_ENV: prod
    volumes:
      - /opt/gamepedia-data/screenshots:/app/screenshots
    ports:
      - "4001:4001"
    networks:
      - nexus_default

networks:
  nexus_default:
    external: true
